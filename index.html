<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پیش‌بینی جام جهانی ۲۰۲۶</title>
    <style>
        body { font-family: Tahoma; background: #0f172a; color: white; text-align: center; padding: 20px; }
        table { width: 100%; margin: 20px 0; border-collapse: collapse; }
        th, td { border: 1px solid #666; padding: 12px; }
        th { background: #1e40af; }
    </style>
</head>
<body>
    <h1>🏆 پیش‌بینی جام جهانی ۲۰۲۶</h1>
    <p>در حال بارگذاری داده‌ها...</p>

    <table id="table">
        <thead><tr><th>بازی</th><th>زمان</th><th>پیش‌بینی</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        async function load() {
            try {
                const res = await fetch('https://your-api-link.com/matches'); // ← اینجا بعداً عوض می‌کنیم
                const data = await res.json();
                let html = "";
                data.forEach(m => {
                    html += `<tr><td>${m.home} vs ${m.away}</td><td>${m.time}</td><td>${m.pred}</td></tr>`;
                });
                document.querySelector("#table tbody").innerHTML = html;
            } catch(e) {
                document.querySelector("p").innerHTML = "فعلاً داده‌ها آماده نیست. بعداً امتحان کن.";
            }
        }
        load();
        setInterval(load, 300000); // هر ۵ دقیقه بروز شود
    </script>
</body>
</html>
